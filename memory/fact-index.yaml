      - template-change
      - validation
      - skill-matrix-design
    read_triggers:
      - profile-artifact-change
      - template-change
      - profile-change
      - before-commit
    enforcement:
      required_commands:
        - "uv run scripts/validate_skill_taxonomy.py"
        - "python3 -m unittest -v tests.test_research_distillation_assets"

