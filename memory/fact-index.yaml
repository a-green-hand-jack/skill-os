  - id: PC-003
    type: convention
    priority: P0
    status: active
    scope: project
    owner_skill: skill-system-auditor
    source_of_truth: memory/project-conventions.md#PC-003
    text: >
      Run `python3 scripts/validate_skills.py` and `uv run scripts/validate_skill_taxonomy.py`
